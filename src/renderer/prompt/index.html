<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>tenfifth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      -webkit-app-region: drag;
      user-select: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      letter-spacing: 0.02em;
    }

    .time-range {
      font-size: 12px;
      color: #636366;
      font-variant-numeric: tabular-nums;
    }

    textarea {
      -webkit-app-region: no-drag;
      user-select: text;
      flex: 1;
      background: #2c2c2e;
      border: 1px solid #3a3a3c;
      border-radius: 8px;
      color: #f2f2f7;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    textarea::placeholder { color: #48484a; }
    textarea:focus { border-color: #0a84ff; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      -webkit-app-region: no-drag;
    }

    button {
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      padding: 7px 14px;
      cursor: pointer;
      transition: opacity 0.1s;
    }

    button:active { opacity: 0.7; }

    .btn-submit {
      background: #0a84ff;
      color: #fff;
      flex: 1;
    }

    .btn-submit:disabled {
      background: #1c3a5a;
      color: #48484a;
      cursor: not-allowed;
    }

    .btn-skip {
      background: #2c2c2e;
      color: #8e8e93;
      border: 1px solid #3a3a3c;
    }

    .btn-snooze {
      background: #2c2c2e;
      color: #8e8e93;
      border: 1px solid #3a3a3c;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
