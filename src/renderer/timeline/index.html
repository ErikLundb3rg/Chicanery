<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>tenfifth — Today</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .titlebar {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      padding-top: 28px;
      flex-shrink: 0;
    }

    .titlebar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f2f2f7;
    }

    .date {
      font-size: 12px;
      color: #8e8e93;
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }

    .entries {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px 20px;
    }

    .entries::-webkit-scrollbar { width: 4px; }
    .entries::-webkit-scrollbar-track { background: transparent; }
    .entries::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 2px; }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #48484a;
      font-size: 14px;
      gap: 8px;
    }

    .empty .icon { font-size: 32px; }

    .entry {
      display: flex;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid #2c2c2e;
    }

    .entry:last-child { border-bottom: none; }

    .entry-time {
      font-size: 11px;
      color: #636366;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 80px;
    }

    .entry-content {
      font-size: 14px;
      line-height: 1.5;
      color: #e5e5ea;
    }

    .total {
      padding: 12px 20px;
      border-top: 1px solid #2c2c2e;
      font-size: 12px;
      color: #8e8e93;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
